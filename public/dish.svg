<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" role="img" aria-label="An overhead illustration of a grain bowl — roasted vegetables, greens, cherry tomatoes, chickpeas and a soft egg — with a fork and linen napkin, in warm neutral tones.">
  <rect width="900" height="520" fill="#EEE8DB"/>

  <!-- scattered herbs (editorial) -->
  <g fill="#6E7F3E">
    <path d="M726 96 q10 -14 26 -10 q-8 12 -26 10 Z"/>
    <path d="M150 402 q-12 -12 -8 -28 q12 8 8 28 Z"/>
  </g>
  <circle cx="792" cy="150" r="4" fill="#C1553F"/>
  <circle cx="120" cy="150" r="3.5" fill="#C9A24C"/>

  <!-- napkin -->
  <g>
    <rect x="612" y="322" width="250" height="150" rx="14" fill="#E7DFCE" transform="rotate(-7 737 397)"/>
    <line x1="628" y1="360" x2="836" y2="335" stroke="#D6CBB4" stroke-width="3" transform="rotate(-7 737 397)"/>
    <line x1="632" y1="392" x2="840" y2="367" stroke="#D6CBB4" stroke-width="3" transform="rotate(-7 737 397)"/>
  </g>

  <!-- fork -->
  <g stroke="#B7A98D" stroke-width="7" stroke-linecap="round" fill="none">
    <line x1="700" y1="150" x2="700" y2="300"/>
    <line x1="684" y1="150" x2="684" y2="205"/>
    <line x1="716" y1="150" x2="716" y2="205"/>
    <path d="M684 205 q16 14 32 0" stroke-width="6"/>
  </g>

  <!-- plate shadow + plate -->
  <ellipse cx="352" cy="278" rx="212" ry="206" fill="#E2D8C6"/>
  <circle cx="344" cy="266" r="210" fill="#F7F3EA"/>
  <circle cx="344" cy="266" r="176" fill="none" stroke="#E7DDCB" stroke-width="3"/>

  <!-- grain base -->
  <circle cx="344" cy="266" r="160" fill="#EBDCB8"/>
  <g fill="#DCC896">
    <circle cx="300" cy="210" r="3"/><circle cx="392" cy="230" r="3"/><circle cx="360" cy="320" r="3"/>
    <circle cx="270" cy="300" r="3"/><circle cx="420" cy="300" r="3"/><circle cx="330" cy="360" r="3"/>
    <circle cx="250" cy="250" r="3"/><circle cx="410" cy="200" r="3"/>
  </g>

  <!-- roasted squash cubes (top-left) -->
  <g>
    <rect x="236" y="176" width="46" height="42" rx="9" fill="#CE8442"/>
    <rect x="236" y="176" width="46" height="16" rx="8" fill="#DEA45C"/>
    <rect x="286" y="196" width="44" height="40" rx="9" fill="#C97B3C"/>
    <rect x="286" y="196" width="44" height="15" rx="8" fill="#DA9A54"/>
    <rect x="252" y="224" width="42" height="38" rx="9" fill="#CE8442"/>
    <rect x="252" y="224" width="42" height="14" rx="8" fill="#DEA45C"/>
  </g>

  <!-- greens cluster (bottom) -->
  <g fill="#5F6B3C">
    <path d="M300 356 q26 -30 58 -14 q-18 30 -58 14 Z"/>
    <path d="M344 372 q30 -24 60 -2 q-24 26 -60 2 Z"/>
    <path d="M286 336 q22 -22 48 -10 q-16 24 -48 10 Z"/>
  </g>
  <g fill="#7A8A4A">
    <path d="M314 350 q20 -20 42 -8 q-16 20 -42 8 Z"/>
    <path d="M352 364 q22 -16 44 0 q-18 18 -44 0 Z"/>
  </g>

  <!-- avocado crescents -->
  <g>
    <path d="M398 240 q40 6 42 46 q-30 6 -46 -18 q-8 -20 4 -28 Z" fill="#83994F"/>
    <path d="M402 250 q28 6 30 34 q-22 4 -34 -14 q-6 -14 4 -20 Z" fill="#B4C77E"/>
  </g>

  <!-- chickpeas -->
  <g fill="#D8C48A">
    <ellipse cx="272" cy="298" rx="11" ry="9"/>
    <ellipse cx="296" cy="316" rx="11" ry="9"/>
    <ellipse cx="256" cy="322" rx="10" ry="8"/>
  </g>

  <!-- cherry tomatoes -->
  <g>
    <circle cx="404" cy="316" r="17" fill="#C1553F"/><circle cx="398" cy="310" r="4" fill="#D98066" opacity="0.8"/>
    <circle cx="330" cy="214" r="15" fill="#C15B45"/><circle cx="325" cy="209" r="3.5" fill="#D98066" opacity="0.8"/>
  </g>

  <!-- soft egg (center) -->
  <ellipse cx="340" cy="286" rx="42" ry="36" fill="#FBF7EE"/>
  <circle cx="340" cy="286" r="18" fill="#E4A93A"/>
  <circle cx="333" cy="279" r="5" fill="#F0C46A" opacity="0.9"/>

  <!-- red-onion slivers -->
  <g stroke="#8A5E80" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M382 196 q22 8 28 26"/>
    <path d="M262 352 q18 -6 34 4"/>
  </g>

  <!-- olive-oil drizzle -->
  <path d="M244 260 q30 -18 58 0 t58 0 t58 0" stroke="#C9A24C" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.85"/>

  <!-- sesame seeds -->
  <g fill="#8A754A">
    <ellipse cx="318" cy="252" rx="3" ry="1.6"/><ellipse cx="372" cy="270" rx="3" ry="1.6" transform="rotate(20 372 270)"/>
    <ellipse cx="300" cy="288" rx="3" ry="1.6" transform="rotate(-15 300 288)"/><ellipse cx="360" cy="240" rx="3" ry="1.6"/>
  </g>

  <!-- pinch bowl of sauce (top-right) -->
  <circle cx="792" cy="266" r="46" fill="#EDE6D5"/>
  <circle cx="792" cy="266" r="46" fill="none" stroke="#DBD0BB" stroke-width="3"/>
  <circle cx="792" cy="266" r="30" fill="#6E7F3E"/>
  <circle cx="784" cy="258" r="7" fill="#8D9B57" opacity="0.7"/>
</svg>
